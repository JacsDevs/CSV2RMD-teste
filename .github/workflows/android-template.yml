name: Android Template Build

on:
  push:
    branches: [main]
    paths:
      - 'android-template/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK platform + build-tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>/dev/null || true

      - name: Setup Gradle 8.13 (sem wrapper jar)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Build unsigned release APK
        working-directory: android-template
        run: gradle assembleRelease

      - name: Locate and copy APK
        run: |
          mkdir -p release-artifacts
          APK=$(find android-template/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          cp "$APK" release-artifacts/template.apk

      - name: Upload APK como artefato do workflow
        uses: actions/upload-artifact@v4
        with:
          name: android-template-apk
          path: release-artifacts/template.apk
          retention-days: 90

      - name: Criar GitHub Release (apenas em tags android-template-v*)
        if: startsWith(github.ref, 'refs/tags/android-template-v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/template.apk
          name: Android Template ${{ github.ref_name }}
          body: |
            APK template não assinado para geração de dicionários Android.

            **Como usar:**
            1. O aplicativo Tauri usa este APK como base
            2. Substitui `assets/index.html` e mídias com o conteúdo do dicionário
            3. Assina com `apksigner` usando o keystore do utilizador

            **Não é um APK para instalação direta** — use o app CSV2DMLI.
