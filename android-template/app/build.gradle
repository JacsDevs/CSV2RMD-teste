plugins {
    id 'com.android.application'
}

android {
    namespace 'br.com.csv2dmli.dicionario'
    compileSdk 34

    defaultConfig {
        applicationId "br.com.csv2dmli.dicionario"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            // Sem signingConfig — APK não assinado para ser assinado pelo Tauri via apksigner
            signingConfig null
            minifyEnabled false
            shrinkResources false
        }
    }
}
