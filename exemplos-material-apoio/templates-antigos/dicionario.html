<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ metadados.html }}</title>
    <!-- Fonte e ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== VARIÁVEIS E RESET ===== */
        :root {
            --cor-fundo: #f8fafc;
            --cor-texto: #1e293b;
            --cor-primaria: #0f172a;
            --cor-secundaria: #3b82f6;
            --cor-borda: #e2e8f0;
            --cor-card: #ffffff;
            --sombra-card: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --sombra-modal: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --transicao: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .cabecalho {
            background: var(--cor-card);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: var(--sombra-card);
            border: 1px solid var(--cor-borda);
        }

        .cabecalho h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--cor-primaria);
            margin-bottom: 8px;
        }

        .cabecalho .meta {
            display: flex;
            gap: 24px;
            color: #64748b;
            font-size: 0.95rem;
        }

        .introducao {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--cor-borda);
            color: #475569;
        }

        .barra-controle {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            background: var(--cor-card);
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: var(--sombra-card);
            border: 1px solid var(--cor-borda);
        }

        .busca-wrapper {
            flex: 2;
            min-width: 250px;
            display: flex;
            gap: 8px;
        }

        .busca-wrapper input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--cor-borda);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transicao);
        }

        .busca-wrapper input:focus {
            outline: none;
            border-color: var(--cor-secundaria);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .busca-wrapper button {
            background: var(--cor-secundaria);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transicao);
        }

        .busca-wrapper button:hover {
            background: #2563eb;
        }

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .filtro-select {
            padding: 8px 12px;
            border: 1px solid var(--cor-borda);
            border-radius: 10px;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 160px;
        }

        .ordenacao {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .ordenacao label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .contador {
            background: #eef2ff;
            color: var(--cor-secundaria);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            min-width: 120px;
        }

        .contador .progresso {
            font-weight: 400;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--cor-card);
            border-radius: 12px;
            box-shadow: var(--sombra-card);
            border: 1px solid var(--cor-borda);
            transition: var(--transicao);
            cursor: pointer;
            display: flex;
            padding: 16px;
            gap: 16px;
            align-items: flex-start;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border-color: var(--cor-secundaria);
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-lexical {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--cor-primaria);
            margin-bottom: 2px;
            word-break: break-word;
        }

        .card-traducao {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .card-classe {
            display: inline-block;
            background: #eef2ff;
            color: var(--cor-secundaria);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card-midia-indicador {
            display: flex;
            gap: 10px;
            color: #64748b;
            font-size: 0.75rem;
        }

        .card-img-wrapper {
            flex-shrink: 0;
            width: 70px;
            height: 70px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-img-wrapper img {
            transform: scale(1.05);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transicao);
            padding: 20px;
        }

        .modal-overlay.ativo {
            opacity: 1;
            visibility: visible;
        }

        .modal-conteudo {
            background: var(--cor-card);
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--sombra-modal);
            position: relative;
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: var(--cor-card);
            padding: 20px 28px 16px;
            border-bottom: 1px solid var(--cor-borda);
            z-index: 5;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .modal-header-titulo {
            flex: 1;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .modal-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--cor-primaria);
            margin-right: 8px;
        }

        .modal-audio-btn {
            background: var(--cor-secundaria);
            color: white;
            border: none;
            border-radius: 40px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transicao);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .modal-audio-btn:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .modal-nav {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .modal-nav-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transicao);
            color: var(--cor-texto);
            font-size: 1.2rem;
        }

        .modal-nav-btn:hover {
            background: var(--cor-secundaria);
            color: white;
        }

        .modal-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .modal-fechar {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #64748b;
            padding: 0 8px;
            transition: var(--transicao);
            line-height: 1;
        }

        .modal-fechar:hover {
            color: var(--cor-primaria);
        }

        .modal-body {
            padding: 24px 28px 32px;
        }

        .detalhe-secao {
            margin-bottom: 28px;
        }

        .detalhe-titulo {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--cor-borda);
            padding-bottom: 6px;
        }

        .detalhe-valor {
            font-size: 1.1rem;
            color: var(--cor-texto);
        }

        .midia-galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .midia-item img, .midia-item video {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--cor-borda);
        }

        .audio-btn {
            background: #f8fafc;
            border: 1px solid var(--cor-borda);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 4px 4px 4px 0;
            cursor: pointer;
            transition: var(--transicao);
            font-size: 0.9rem;
        }

        .audio-btn:hover {
            background: var(--cor-secundaria);
            color: white;
            border-color: var(--cor-secundaria);
        }

        .audio-btn i {
            margin-right: 8px;
        }

        .exemplo-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .exemplo-texto {
            font-style: italic;
            margin-bottom: 8px;
        }

        .exemplo-traducao {
            color: #475569;
        }

        .texto-frase {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed var(--cor-borda);
        }

        .loading-indicator {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .sem-resultados {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--cor-card);
            border-radius: 16px;
            border: 1px solid var(--cor-borda);
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .cabecalho { padding: 20px; }
            .barra-controle { flex-direction: column; align-items: stretch; }
            .ordenacao { margin-left: 0; justify-content: flex-end; }
            .filtros { flex-direction: column; }
            .filtro-select { width: 100%; }
            .modal-header { flex-wrap: wrap; }
        }

        .texto-muted { color: #64748b; }
        .mb-2 { margin-bottom: 8px; }
        .mt-4 { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h1>{{ metadados.html }}</h1>
            <div class="meta">
                <span><i class="far fa-user"></i> {{ metadados.autor }}</span>
                <span><i class="far fa-calendar-alt"></i> Versão {{ metadados.versao }}</span>
            </div>
            <div class="introducao">
                {{ textos.intro_html | safe }}
            </div>
        </header>

        <div class="barra-controle">
            <div class="busca-wrapper">
                <input type="text" id="search-input" placeholder="Pesquisar termo, tradução, descrição...">
                <button id="search-button"><i class="fas fa-search"></i> Buscar</button>
            </div>
            <div class="filtros">
                <select id="filtro-semantico" class="filtro-select">
                    <option value="">Todos os campos semânticos</option>
                </select>
                <select id="filtro-classe" class="filtro-select">
                    <option value="">Todas as classes</option>
                </select>
            </div>
            <div class="ordenacao">
                <label>
                    <input type="checkbox" id="ordenar-traducao"> Ordenar por tradução
                </label>
            </div>
            <div class="contador" id="contador-itens">
                <span id="loading-count">0</span> itens
                <div id="progresso-carga" class="progresso"></div>
            </div>
        </div>

        <div id="grid-container" class="grid-container">
            <div class="loading-indicator">
                <i class="fas fa-spinner fa-spin"></i> Carregando dados...
            </div>
        </div>

        <div id="scroll-sentinela" style="height:1px; width:100%;"></div>
    </div>

    <div class="modal-overlay" id="modal-detalhes">
        <div class="modal-conteudo">
            <div class="modal-header">
                <div class="modal-header-titulo">
                    <h2 id="modal-titulo"></h2>
                    <button class="modal-audio-btn" id="modal-audio-btn" style="display: none;" title="Ouvir pronúncia">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div class="modal-nav">
                    <button class="modal-nav-btn" id="modal-anterior" title="Anterior"><i class="fas fa-chevron-left"></i></button>
                    <button class="modal-nav-btn" id="modal-proximo" title="Próximo"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button class="modal-fechar" id="modal-fechar">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        // ==============================================
        // CONFIGURAÇÕES E VARIÁVEIS GLOBAIS
        // ==============================================
        window.TAMANHO_LOTE = 20;
        window.dados = [];                  // todos os itens (completo)
        window.dadosFiltrados = [];        // resultado completo após filtro/busca (ordenado)
        window.itensExibidos = [];         // itens já renderizados (subconjunto de dadosFiltrados)
        window.ultimoIndiceExibido = 0;    // índice do último item exibido (em dadosFiltrados)
        window.carregandoDados = false;

        // Elementos DOM
        const gridContainer = document.getElementById('grid-container');
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const filtroSemantico = document.getElementById('filtro-semantico');
        const filtroClasse = document.getElementById('filtro-classe');
        const ordenarTraducaoCheck = document.getElementById('ordenar-traducao');
        const contadorSpan = document.getElementById('loading-count');
        const progressoDiv = document.getElementById('progresso-carga');
        const modalOverlay = document.getElementById('modal-detalhes');
        const modalTitulo = document.getElementById('modal-titulo');
        const modalAudioBtn = document.getElementById('modal-audio-btn');
        const modalBody = document.getElementById('modal-body');
        const modalFechar = document.getElementById('modal-fechar');
        const modalAnterior = document.getElementById('modal-anterior');
        const modalProximo = document.getElementById('modal-proximo');
        const sentinela = document.getElementById('scroll-sentinela');

        // Estado da busca/filtro
        let termoBusca = '';
        let ordenarPorTraducao = false;
        let filtroSemanticoValor = '';
        let filtroClasseValor = '';

        let itemAtualNoModal = null;

        // ==============================================
        // FUNÇÕES AUXILIARES
        // ==============================================
        function resolverMidia(nomeArquivo, pasta) {
    if (!nomeArquivo) return '';
    
    const midias = window.DicionarioMidias || {};
    const fonte = midias[nomeArquivo];
    
    if (!fonte) {
        // Fallback: caminho relativo
        return `${pasta}/${nomeArquivo}`;
    }
    
    // Se for Base64 (data:), usa direto
    if (fonte.startsWith('data:')) {
        return fonte;
    }
    
    // Se for caminho relativo (audio/, foto/, video/)
    if (fonte.startsWith(pasta + '/') || fonte.startsWith(pasta)) {
        return fonte;
    }
    
    // Fallback
    return `${pasta}/${nomeArquivo}`;
}

        function criarCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${item['ITEM_LEXICAL']}`;
            
            const temImagem = item['IMAGEM'] ? true : false;
            const primeiraImagem = temImagem ? item['IMAGEM'].split('|')[0].trim() : null;
            const temAudio = item['ARQUIVO_SONORO'] ? true : false;
            const temVideo = item['ARQUIVO_VIDEO'] ? true : false;
            
            let html = `<div class="card-info">`;
            html += `<div class="card-lexical">${item['ITEM_LEXICAL'] || '???'}</div>`;
            html += `<div class="card-traducao">${item['TRADUCAO_SIGNIFICADO'] || ''}</div>`;
            if (item['CLASSE_GRAMATICAL']) {
                html += `<span class="card-classe"><i class="fas fa-tag"></i> ${item['CLASSE_GRAMATICAL']}</span>`;
            }
            html += `<div class="card-midia-indicador">`;
            if (temImagem) html += `<span><i class="fas fa-image"></i></span>`;
            if (temAudio) html += `<span><i class="fas fa-volume-up"></i></span>`;
            if (temVideo) html += `<span><i class="fas fa-video"></i></span>`;
            html += `</div></div>`;
            
            if (primeiraImagem) {
                const src = resolverMidia(primeiraImagem, 'foto');
                html += `<div class="card-img-wrapper"><img src="${src}" alt="${item['ITEM_LEXICAL']}" loading="lazy"></div>`;
            }
            
            card.innerHTML = html;
            card.addEventListener('click', () => abrirModal(item));
            return card;
        }

        function renderizarCards(itens) {
            gridContainer.innerHTML = '';
            if (!itens || itens.length === 0) {
                gridContainer.innerHTML = `<div class="sem-resultados">
                    <i class="fas fa-search" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 16px;"></i>
                    <h3>Nenhum item encontrado</h3>
                    <p>Tente ajustar os filtros ou o termo de busca.</p>
                </div>`;
                return;
            }
            const fragment = document.createDocumentFragment();
            itens.forEach(item => fragment.appendChild(criarCard(item)));
            gridContainer.appendChild(fragment);
        }

        function atualizarProgresso() {
            const total = window.dadosFiltrados.length;
            const exibidos = window.itensExibidos.length;
            contadorSpan.textContent = total;
            progressoDiv.textContent = `${exibidos}/${total} carregados`;
            if (exibidos < total) {
                progressoDiv.textContent += ` (${total - exibidos} restantes)`;
            }
        }

        // ==============================================
        // CARREGAMENTO PROGRESSIVO (A PARTIR DA LISTA FILTRADA)
        // ==============================================
        function carregarLoteFiltrado(quantidade = window.TAMANHO_LOTE) {
            if (window.carregandoDados) return;
            if (window.ultimoIndiceExibido >= window.dadosFiltrados.length) return;

            window.carregandoDados = true;
            const inicio = window.ultimoIndiceExibido;
            const fim = Math.min(inicio + quantidade, window.dadosFiltrados.length);
            const lote = window.dadosFiltrados.slice(inicio, fim);

            window.itensExibidos.push(...lote);
            window.ultimoIndiceExibido = fim;

            renderizarCards(window.itensExibidos);
            atualizarProgresso();
            window.carregandoDados = false;
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !window.carregandoDados && window.ultimoIndiceExibido < window.dadosFiltrados.length) {
                    carregarLoteFiltrado();
                }
            }, { rootMargin: '200px' });
            observer.observe(sentinela);
        }

        // ==============================================
        // FILTRAGEM E BUSCA (APLICADA SOBRE TODOS OS DADOS)
        // ==============================================
        function aplicarFiltrosEBusca() {
            const termo = termoBusca.toLowerCase();
            const semantico = filtroSemanticoValor;
            const classe = filtroClasseValor;

            // Filtra sobre TODOS os dados
            let resultados = window.dados.filter(item => {
                if (semantico && item['CAMPO_SEMANTICO'] !== semantico) return false;
                if (classe && item['CLASSE_GRAMATICAL'] !== classe) return false;
                if (termo) {
                    const campos = [
                        item['ITEM_LEXICAL'],
                        item['TRADUCAO_SIGNIFICADO'],
                        item['DESCRICAO'],
                        item['CLASSE_GRAMATICAL'],
                        item['CAMPO_SEMANTICO'],
                        item['SUB_CAMPO_SEMANTICO']
                    ];
                    return campos.some(c => c && c.toString().toLowerCase().includes(termo));
                }
                return true;
            });

            if (ordenarPorTraducao) {
                resultados.sort((a, b) => (a['TRADUCAO_SIGNIFICADO'] || '').localeCompare(b['TRADUCAO_SIGNIFICADO'] || ''));
            }

            // Atualiza estado
            window.dadosFiltrados = resultados;
            window.itensExibidos = [];
            window.ultimoIndiceExibido = 0;

            // Carrega o primeiro lote imediatamente
            carregarLoteFiltrado();

            // Ajusta navegação do modal, se aberto
            if (modalOverlay.classList.contains('ativo') && itemAtualNoModal) {
                const aindaPresente = resultados.includes(itemAtualNoModal);
                if (!aindaPresente) fecharModal();
                else atualizarEstadoNavegacao();
            }
        }

        function inicializarFiltros() {
            const semanticos = [...new Set(window.dados.map(i => i['CAMPO_SEMANTICO']).filter(Boolean))].sort();
            const classes = [...new Set(window.dados.map(i => i['CLASSE_GRAMATICAL']).filter(Boolean))].sort();
            
            filtroSemantico.innerHTML = '<option value="">Todos os campos semânticos</option>';
            semanticos.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                filtroSemantico.appendChild(opt);
            });
            
            filtroClasse.innerHTML = '<option value="">Todas as classes</option>';
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                filtroClasse.appendChild(opt);
            });
        }

        // ==============================================
        // ADIÇÃO DE DADOS (CHAMADO PELOS SCRIPTS INLINE)
        // ==============================================
        function adicionaDados(bloco) {
            // Processamento simples de homônimos (opcional)
            window.dados.push(...bloco);
            contadorSpan.textContent = window.dados.length;
            
            if (window.dados.length === bloco.length) {
                // primeiro carregamento
                inicializarFiltros();
                window.dadosFiltrados = [...window.dados];
                window.itensExibidos = [];
                window.ultimoIndiceExibido = 0;
                carregarLoteFiltrado();
                setupIntersectionObserver();
            } else {
                // dados adicionais: apenas atualiza os filtros (não recarrega tudo automaticamente)
                atualizarOpcoesFiltros();
                // reaplica o filtro atual para incluir os novos dados
                aplicarFiltrosEBusca();
            }
        }

        function atualizarOpcoesFiltros() {
            inicializarFiltros();
        }

        // Event listeners
        searchButton.addEventListener('click', () => {
            termoBusca = searchInput.value;
            aplicarFiltrosEBusca();
        });
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                termoBusca = searchInput.value;
                aplicarFiltrosEBusca();
            }
        });
        filtroSemantico.addEventListener('change', (e) => {
            filtroSemanticoValor = e.target.value;
            aplicarFiltrosEBusca();
        });
        filtroClasse.addEventListener('change', (e) => {
            filtroClasseValor = e.target.value;
            aplicarFiltrosEBusca();
        });
        ordenarTraducaoCheck.addEventListener('change', (e) => {
            ordenarPorTraducao = e.target.checked;
            aplicarFiltrosEBusca();
        });

        // ==============================================
        // MODAL (mantido igual)
        // ==============================================
        function abrirModal(item) {
            itemAtualNoModal = item;
            preencherModal(item);
            modalOverlay.classList.add('ativo');
            document.body.style.overflow = 'hidden';
            atualizarEstadoNavegacao();
        }

        function preencherModal(item) {
            modalTitulo.textContent = item['ITEM_LEXICAL'] || 'Item';
            if (item['ARQUIVO_SONORO']) {
                const audioSrc = resolverMidia(item['ARQUIVO_SONORO'].split('|')[0].trim(), 'audio');
                modalAudioBtn.style.display = 'flex';
                modalAudioBtn.onclick = () => tocarAudio(audioSrc);
            } else {
                modalAudioBtn.style.display = 'none';
            }
            let html = '';
            html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-info-circle"></i> Informações</div>`;
            if (item['TRADUCAO_SIGNIFICADO']) html += `<div class="detalhe-valor mb-2"><strong>Tradução/Significado:</strong> ${item['TRADUCAO_SIGNIFICADO']}</div>`;
            if (item['CLASSE_GRAMATICAL']) html += `<div class="detalhe-valor mb-2"><strong>Classe Gramatical:</strong> ${item['CLASSE_GRAMATICAL']}</div>`;
            if (item['CAMPO_SEMANTICO']) html += `<div class="detalhe-valor mb-2"><strong>Campo Semântico:</strong> ${item['CAMPO_SEMANTICO']}</div>`;
            if (item['SUB_CAMPO_SEMANTICO']) html += `<div class="detalhe-valor mb-2"><strong>Subcampo:</strong> ${item['SUB_CAMPO_SEMANTICO']}</div>`;
            html += `</div>`;
            if (item['DESCRICAO']) html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-align-left"></i> Descrição</div><div class="detalhe-valor">${item['DESCRICAO']}</div></div>`;
            if (item['TRANSCRICAO_FONEMICA'] || item['TRANSCRICAO_FONETICA']) {
                html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-waveform"></i> Pronúncia</div>`;
                if (item['TRANSCRICAO_FONEMICA']) html += `<div class="detalhe-valor mb-2"><strong>Fonêmica:</strong> /${item['TRANSCRICAO_FONEMICA']}/</div>`;
                if (item['TRANSCRICAO_FONETICA']) html += `<div class="detalhe-valor"><strong>Fonética:</strong> [${item['TRANSCRICAO_FONETICA']}]</div>`;
                html += `</div>`;
            }
            if (item['ARQUIVO_SONORO']) {
                const audios = item['ARQUIVO_SONORO'].split('|');
                if (audios.length > 1) {
                    html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-volume-up"></i> Áudios adicionais</div>`;
                    audios.slice(1).forEach(aud => { const src = resolverMidia(aud.trim(), 'audio'); html += `<button class="audio-btn" onclick="tocarAudio('${src}')"><i class="fas fa-play"></i> Ouvir</button>`; });
                    html += `</div>`;
                }
            }
            if (item['IMAGEM']) {
                const imgs = item['IMAGEM'].split('|');
                const legends = item['LEGENDA_IMAGEM'] ? item['LEGENDA_IMAGEM'].split('|') : [];
                html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-images"></i> Imagens</div><div class="midia-galeria">`;
                imgs.forEach((img, i) => { const src = resolverMidia(img.trim(), 'foto'); const leg = legends[i] || ''; html += `<div class="midia-item"><img src="${src}" alt="${leg}" loading="lazy">${leg ? `<div class="texto-muted" style="margin-top:6px;">${leg}</div>` : ''}</div>`; });
                html += `</div></div>`;
            }
            if (item['ARQUIVO_VIDEO']) {
                const videos = item['ARQUIVO_VIDEO'].split('|');
                html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-video"></i> Vídeos</div><div class="midia-galeria">`;
                videos.forEach(vid => { const src = resolverMidia(vid.trim(), 'video'); html += `<div class="midia-item"><video controls><source src="${src}"></video></div>`; });
                html += `</div></div>`;
            }
            if (item['TRANSCRICAO_EXEMPLO']) {
                const exemplos = item['TRANSCRICAO_EXEMPLO'].split('|');
                const traducoes = item['TRADUCAO_EXEMPLO'] ? item['TRADUCAO_EXEMPLO'].split('|') : [];
                const audiosEx = item['ARQUIVO_SONORO_EXEMPLO'] ? item['ARQUIVO_SONORO_EXEMPLO'].split('|') : [];
                html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-comment-dots"></i> Exemplos</div>`;
                exemplos.forEach((ex, i) => {
                    html += `<div class="exemplo-item"><div class="exemplo-texto">${ex}</div>`;
                    if (traducoes[i]) html += `<div class="exemplo-traducao">${traducoes[i]}</div>`;
                    if (audiosEx[i]) { const src = resolverMidia(audiosEx[i].trim(), 'audio'); html += `<button class="audio-btn" style="margin-top:8px;" onclick="tocarAudio('${src}')"><i class="fas fa-play"></i> Ouvir exemplo</button>`; }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            if (item['TEXTO']) {
                try {
                    const textoData = JSON.parse(item['TEXTO']);
                    html += `<div class="detalhe-secao"><div class="detalhe-titulo"><i class="fas fa-paragraph"></i> Texto</div>`;
                    if (textoData.titulo) html += `<h3 style="margin-bottom:16px;">${textoData.titulo}</h3>`;
                    textoData.frases.forEach(frase => {
                        html += `<div class="texto-frase">`;
                        if (frase.texto_original) html += `<div><strong>Original:</strong> ${frase.texto_original}</div>`;
                        if (frase.traducao) html += `<div class="texto-muted"><strong>Tradução:</strong> ${frase.traducao}</div>`;
                        if (frase.audio) html += `<button class="audio-btn" style="margin-top:6px;" onclick="tocarAudio('${frase.audio}')"><i class="fas fa-play"></i> Ouvir</button>`;
                        html += `</div>`;
                    });
                    if (textoData.texto_nao_literal) html += `<div class="mt-4 p-3" style="background:#f1f5f9; border-radius:12px;">${textoData.texto_nao_literal}</div>`;
                    html += `</div>`;
                } catch(e) {
                    html += `<div class="detalhe-secao"><div class="detalhe-titulo">Texto</div><div>${item['TEXTO']}</div></div>`;
                }
            }
            modalBody.innerHTML = html;
        }

        function atualizarEstadoNavegacao() {
            if (!itemAtualNoModal) return;
            const lista = window.dadosFiltrados;
            const idx = lista.indexOf(itemAtualNoModal);
            modalAnterior.disabled = (idx <= 0);
            modalProximo.disabled = (idx >= lista.length - 1);
        }

        function navegarModal(direcao) {
            if (!itemAtualNoModal) return;
            const lista = window.dadosFiltrados;
            let idx = lista.indexOf(itemAtualNoModal);
            if (direcao === 'anterior' && idx > 0) idx--;
            else if (direcao === 'proximo' && idx < lista.length - 1) idx++;
            else return;
            itemAtualNoModal = lista[idx];
            preencherModal(itemAtualNoModal);
            atualizarEstadoNavegacao();
        }

        function fecharModal() {
            modalOverlay.classList.remove('ativo');
            document.body.style.overflow = '';
            itemAtualNoModal = null;
        }

        window.tocarAudio = function(src) {
            const audio = new Audio(src);
            audio.play().catch(e => console.warn('Erro ao tocar áudio:', e));
        };

        modalFechar.addEventListener('click', fecharModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) fecharModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('ativo')) fecharModal(); });
        modalAnterior.addEventListener('click', () => navegarModal('anterior'));
        modalProximo.addEventListener('click', () => navegarModal('proximo'));
    </script>

    {{ scripts_dados_js | safe }}
</body>
</html>
