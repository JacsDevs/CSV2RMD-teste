<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc; --bg-panel: #ffffff;
            --primary: #3b82f6; --primary-hover: #2563eb;
            --border-color: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 380px; background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10;}
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-body); overflow-y: auto;}

        .header { padding: 15px 20px; background: white; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 18px; }
        
        .sidebar-controls { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        .search-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; outline: none; }
        .search-input:focus { border-color: var(--primary); }
        .btn-group-sidebar { display: flex; gap: 8px; }
        .btn-sidebar { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; border-radius: 6px; border: 1px solid #cbd5e1; background: white; color: #475569; cursor: pointer; }
        .btn-sidebar:hover { background: #e2e8f0; color: #0f172a; }

        .item-list { flex: 1; overflow-y: auto; padding: 10px; }
        .list-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 5px; transition: all 0.2s; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
        .list-item:hover { background: #f1f5f9; }
        .list-item.active { background: #eff6ff; border-color: #bfdbfe; border-left: 4px solid var(--primary); }
        .list-item.error-media { background: #fef2f2; border-color: #fecaca; border-left: 4px solid #ef4444; }
        .list-item.error-fields { background: #fffbeb; border-color: #fde68a; border-left: 4px solid #f59e0b; }
        .item-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--text-main); }
        .item-sub { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .form-container { max-width: 900px; margin: 20px auto; padding: 0 20px; width: 100%; box-sizing: border-box;}
        
        .tabs { display: flex; gap: 5px; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { padding: 10px 15px; border: none; background: transparent; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-btn:hover:not(.active) { color: var(--text-main); }

        .tab-content { display: none; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        input[type="text"], textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px; box-sizing: border-box; background: #f8fafc; transition: all 0.2s;}
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); background: white; outline: none; }
        textarea { resize: vertical; min-height: 70px; }
        
        /* CLASSE DE ERRO USADA PARA DESTACAR BORDAS */
        .input-error { border-color: #ef4444 !important; background: #fef2f2 !important; }

        .dynamic-block { border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #f8fafc; position: relative; }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; font-size: 13px; font-weight: bold; color: var(--text-main);}
        
        button.btn-primary { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        button.btn-primary:hover { background: var(--primary-hover); }
        button.btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;}
        button.btn-danger:hover { background: #fecaca; }
        button.btn-action { background: white; color: #475569; border: 1px solid #cbd5e1; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;}
        button.btn-action:hover { background: #f1f5f9; }
        button.btn-play { background: #dcfce7; color: #059669; border: 1px solid #a7f3d0; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;}
        button.btn-play:hover { background: #a7f3d0; }
        button.btn-add { background: white; color: var(--primary); border: 1px dashed var(--primary); padding: 10px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button.btn-add:hover { background: #eff6ff; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 500; display: none; z-index: 100;}
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2>Dicionário</h2>
            <span id="counterBadge" style="font-size: 12px; color: var(--text-muted); font-weight: bold;">0 itens</span>
        </div>
        <div class="sidebar-controls">
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar palavra..." onkeyup="filtrarLista()">
            <div class="btn-group-sidebar">
                <button class="btn-sidebar" onclick="verificarMidias()">🔍 Ver. Mídias</button>
                <button class="btn-sidebar" onclick="verificarCampos()">⚠️ Ver. Campos</button>
            </div>
        </div>
        <div class="item-list" id="listaItens">
            <div class="empty-state">Carregando dados...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="formTitle" style="color: var(--primary);">Nenhum item selecionado</h2>
            <button class="btn-primary" id="btnSalvar" onclick="salvarAlteracoes()" disabled>Salvar Alterações</button>
        </div>
        
        <div id="emptyView" class="empty-state">
            <h3>Selecione um item no painel lateral</h3>
            <p>Clique em uma palavra na lista para editar todas as suas propriedades.</p>
        </div>

        <div class="form-container" id="formContainer" style="display: none;">
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'tab-dados')">Dados Principais</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-vars')">Variações Lexicais</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-exs')">Exemplos</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-imgs')">Imagens</button>
                <button class="tab-btn" onclick="switchTab(event, 'tab-video')">Mídia Avulsa</button>
            </div>

            <div id="tab-dados" class="tab-content active">
                <div class="grid-row">
                    <div class="form-group">
                        <label>Item Lexical (Principal) *</label>
                        <input type="text" id="inp_ITEM_LEXICAL" class="req-field">
                    </div>
                    <div class="form-group">
                        <label>Classe Gramatical</label>
                        <input type="text" id="inp_CLASSE_GRAMATICAL">
                    </div>
                </div>
                <div class="grid-row">
                    <div class="form-group">
                        <label>Campo Semântico (Categoria) *</label>
                        <input type="text" id="inp_CAMPO_SEMANTICO" class="req-field">
                    </div>
                    <div class="form-group">
                        <label>Sub-Campo Semântico</label>
                        <input type="text" id="inp_SUB_CAMPO_SEMANTICO">
                    </div>
                </div>
                <div class="grid-row">
                    <div class="form-group">
                        <label>Tradução / Significado *</label>
                        <input type="text" id="inp_TRADUCAO_SIGNIFICADO" class="req-field">
                    </div>
                    <div class="form-group">
                        <label>Itens Relacionados</label>
                        <input type="text" id="inp_ITENS_RELACIONADOS">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição Detalhada</label>
                    <textarea id="inp_DESCRICAO"></textarea>
                </div>
            </div>

            <div id="tab-vars" class="tab-content">
                <div id="container-vars"></div>
                <button class="btn-add" onclick="adicionarBloco('vars')">+ Adicionar Variação Lexical</button>
            </div>

            <div id="tab-exs" class="tab-content">
                <div id="container-exs"></div>
                <button class="btn-add" onclick="adicionarBloco('exs')">+ Adicionar Exemplo</button>
            </div>

            <div id="tab-imgs" class="tab-content">
                <div id="container-imgs"></div>
                <button class="btn-add" onclick="adicionarBloco('imgs')">+ Adicionar Imagem</button>
            </div>

            <div id="tab-video" class="tab-content">
                <div class="form-group">
                    <label>Arquivos de Vídeo (Separe por | se houver múltiplos)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="inp_ARQUIVO_VIDEO" style="flex: 1;">
                        <button class="btn-action" onclick="fazerUploadFixo('ARQUIVO_VIDEO', 'inp_ARQUIVO_VIDEO')">📁 Enviar</button>
                        <button class="btn-play" onclick="abrirMidiaIntegrada('ARQUIVO_VIDEO', document.getElementById('inp_ARQUIVO_VIDEO').value)">▶ Abrir</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast">Ação concluída com sucesso!</div>

    <script>
        let dadosGlobais = [];
        let indiceSelecionado = -1;

        let stateVars = []; 
        let stateExs = [];  
        let stateImgs = []; 
        
        let errosMidiaGlobais = {};   // Guarda os erros de mídia vindos do Backend
        let errosCamposGlobais = [];  // Guarda os erros de campos obrigatórios

        const CAMPOS_OBRIGATORIOS = ["ITEM_LEXICAL", "TRADUCAO_SIGNIFICADO", "CAMPO_SEMANTICO"];

        window.onload = carregarDados;

        async function carregarDados() {
            try {
                const res = await fetch('/api/tabela_completa');
                const json = await res.json();
                dadosGlobais = json.data;
                
                document.getElementById('counterBadge').innerText = `${dadosGlobais.length} itens`;
                renderizarLista(dadosGlobais);
            } catch (err) {
                document.getElementById('listaItens').innerHTML = `<div class="empty-state" style="color: #ef4444;">Erro ao carregar dados.</div>`;
            }
        }

        function renderizarLista(lista) {
            const container = document.getElementById('listaItens');
            container.innerHTML = '';
            
            if(lista.length === 0) {
                container.innerHTML = `<div class="empty-state">Nenhum resultado.</div>`;
                return;
            }

            lista.forEach((item) => {
                const originalIndex = dadosGlobais.indexOf(item);
                const el = document.createElement('div');
                el.className = `list-item ${indiceSelecionado === originalIndex ? 'active' : ''}`;
                el.id = `list-item-${originalIndex}`;
                
                const palavra = (item.ITEM_LEXICAL || "Sem termo").split('|')[0].trim();
                const categoria = item.CAMPO_SEMANTICO || "Sem Categoria";
                
                el.innerHTML = `
                    <div class="item-title">${palavra}</div>
                    <div class="item-sub">${categoria} • ${item.CLASSE_GRAMATICAL || '-'}</div>
                `;
                
                el.onclick = () => selecionarItem(originalIndex);
                container.appendChild(el);
            });
            
            // Re-aplica as classes de erro vermelhas caso a lista seja renderizada de novo (durante a busca)
            aplicarCoresSidebar();
        }

        function filtrarLista() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const listaFiltrada = dadosGlobais.filter(item => 
                (item.ITEM_LEXICAL && item.ITEM_LEXICAL.toLowerCase().includes(termo)) ||
                (item.TRADUCAO_SIGNIFICADO && item.TRADUCAO_SIGNIFICADO.toLowerCase().includes(termo))
            );
            renderizarLista(listaFiltrada);
        }

        function verificarCampos() {
            let erroEncontrado = false;
            errosCamposGlobais = [];
            
            dadosGlobais.forEach((item, idx) => {
                let invalido = false;
                CAMPOS_OBRIGATORIOS.forEach(campo => {
                    if (!item[campo] || item[campo].toString().trim() === "") invalido = true;
                });

                if(invalido) {
                    errosCamposGlobais.push(idx);
                    erroEncontrado = true;
                }
            });

            aplicarCoresSidebar();
            destacarErrosNoFormulario();

            if(erroEncontrado) showToast("Campos obrigatórios faltantes destacados em amarelo.", "#f59e0b");
            else showToast("Todos os campos obrigatórios estão preenchidos!", "#10b981");
        }

        async function verificarMidias() {
            try {
                const res = await fetch('/api/verificar_midias_editor');
                const json = await res.json();
                errosMidiaGlobais = json.erros_midia || {}; 

                aplicarCoresSidebar();
                destacarErrosNoFormulario();

                if(Object.keys(errosMidiaGlobais).length > 0) showToast("Mídias ausentes destacadas em vermelho.", "#ef4444");
                else showToast("Todas as mídias foram encontradas nas pastas!", "#10b981");
            } catch (e) {
                showToast("Erro ao verificar mídias com o servidor.", "#ef4444");
            }
        }
        
        function aplicarCoresSidebar() {
            dadosGlobais.forEach((_, idx) => {
                const el = document.getElementById(`list-item-${idx}`);
                if(!el) return;
                
                if(errosMidiaGlobais[idx] || errosMidiaGlobais[idx.toString()]) {
                    el.classList.add('error-media');
                } else {
                    el.classList.remove('error-media');
                }
                
                if(errosCamposGlobais.includes(idx)) {
                    el.classList.add('error-fields');
                } else {
                    el.classList.remove('error-fields');
                }
            });
        }

        function destacarErrosNoFormulario() {
            // 1. Limpa todos os destaques de erro atuais
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
            if (indiceSelecionado < 0) return;

            // 2. Destaca Campos Obrigatórios
            if (errosCamposGlobais.includes(indiceSelecionado)) {
                CAMPOS_OBRIGATORIOS.forEach(campo => {
                    const item = dadosGlobais[indiceSelecionado];
                    if (!item[campo] || item[campo].toString().trim() === "") {
                        const inputEl = document.getElementById(`inp_${campo}`);
                        if (inputEl) inputEl.classList.add('input-error');
                    }
                });
            }

            // 3. Destaca Mídias Específicas
            const midiasFaltantes = errosMidiaGlobais[indiceSelecionado] || errosMidiaGlobais[indiceSelecionado.toString()];
            if (midiasFaltantes) {
                midiasFaltantes.forEach(campo => {
                    if (campo === "ARQUIVO_VIDEO") {
                        const inputVideo = document.getElementById('inp_ARQUIVO_VIDEO');
                        if(inputVideo) inputVideo.classList.add('input-error');
                    }
                    if (campo === "ARQUIVO_SONORO") {
                        document.querySelectorAll('.var-audio-input').forEach(el => el.classList.add('input-error'));
                    }
                    if (campo === "ARQUIVO_SONORO_EXEMPLO") {
                        document.querySelectorAll('.ex-audio-input').forEach(el => el.classList.add('input-error'));
                    }
                    if (campo === "IMAGEM") {
                        document.querySelectorAll('.img-file-input').forEach(el => el.classList.add('input-error'));
                    }
                });
            }
        }

        function selecionarItem(index) {
            indiceSelecionado = index;
            const item = dadosGlobais[index];
            
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            const elAtivo = document.getElementById(`list-item-${index}`);
            if(elAtivo) elAtivo.classList.add('active');

            document.getElementById('emptyView').style.display = 'none';
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('btnSalvar').disabled = false;

            const palavra = (item.ITEM_LEXICAL || "Sem termo").split('|')[0].trim();
            document.getElementById('formTitle').innerText = `Editando: ${palavra}`;

            const camposBasicos = ["CLASSE_GRAMATICAL", "CAMPO_SEMANTICO", "SUB_CAMPO_SEMANTICO", "TRADUCAO_SIGNIFICADO", "ITENS_RELACIONADOS", "DESCRICAO", "ARQUIVO_VIDEO"];
            camposBasicos.forEach(c => {
                if(document.getElementById(`inp_${c}`)) document.getElementById(`inp_${c}`).value = item[c] || "";
            });

            const getArr = (val) => (val || "").split('|').map(v => v.trim());
            const maxLen = (...arrs) => Math.max(...arrs.map(a => a.length));

            stateVars = [];
            const vi = getArr(item.ITEM_LEXICAL); const va = getArr(item.ARQUIVO_SONORO);
            const vf = getArr(item.TRANSCRICAO_FONEMICA); const vt = getArr(item.TRANSCRICAO_FONETICA);
            let lenV = maxLen(vi, va, vf, vt);
            if(lenV === 0 || (lenV===1 && !vi[0])) lenV = 1; 
            for(let i=0; i<lenV; i++) {
                stateVars.push({ item: vi[i]||"", audio: va[i]||"", fone: vf[i]||"", fonet: vt[i]||"" });
            }
            document.getElementById('inp_ITEM_LEXICAL').value = stateVars[0].item;

            stateExs = [];
            const ea = getArr(item.ARQUIVO_SONORO_EXEMPLO); const es = getArr(item.TRANSCRICAO_EXEMPLO); const ed = getArr(item.TRADUCAO_EXEMPLO);
            let lenE = maxLen(ea, es, ed);
            for(let i=0; i<lenE; i++) {
                if(ea[i] || es[i] || ed[i]) stateExs.push({ audio: ea[i]||"", trans: es[i]||"", trad: ed[i]||"" });
            }

            stateImgs = [];
            const im = getArr(item.IMAGEM); const il = getArr(item.LEGENDA_IMAGEM);
            let lenI = maxLen(im, il);
            for(let i=0; i<lenI; i++) {
                if(im[i] || il[i]) stateImgs.push({ img: im[i]||"", leg: il[i]||"" });
            }

            renderDynamicBlocks();
            destacarErrosNoFormulario(); // Refaz a pintura caso exista erro neste item
        }

        function renderDynamicBlocks() {
            const cVars = document.getElementById('container-vars'); cVars.innerHTML = '';
            stateVars.forEach((obj, i) => {
                cVars.innerHTML += `
                <div class="dynamic-block">
                    <div class="block-header">Variação Lexical ${i+1}
                        ${i > 0 ? `<button class="btn-danger" onclick="removerBloco('vars', ${i})">✕ Remover</button>` : `<span style="color:var(--text-muted); font-size:11px;">(Principal)</span>`}
                    </div>
                    <div class="grid-row">
                        <div class="form-group"><label>Termo Lexical</label><input type="text" value="${obj.item}" oninput="stateVars[${i}].item = this.value; if(${i}===0) document.getElementById('inp_ITEM_LEXICAL').value = this.value;"></div>
                        <div class="form-group"><label>Arquivo de Áudio</label>
                            <div style="display:flex; gap:5px;">
                                <input type="text" class="var-audio-input" value="${obj.audio}" oninput="stateVars[${i}].audio = this.value;" style="flex:1;">
                                <button class="btn-action" onclick="fazerUploadDinamico('ARQUIVO_SONORO', 'stateVars', ${i}, 'audio')">📁</button>
                                <button class="btn-play" onclick="abrirMidiaIntegrada('ARQUIVO_SONORO', stateVars[${i}].audio)">▶</button>
                            </div>
                        </div>
                    </div>
                    <div class="grid-row">
                        <div class="form-group"><label>T. Fonêmica</label><input type="text" value="${obj.fone}" oninput="stateVars[${i}].fone = this.value;"></div>
                        <div class="form-group"><label>T. Fonética</label><input type="text" value="${obj.fonet}" oninput="stateVars[${i}].fonet = this.value;"></div>
                    </div>
                </div>`;
            });
            
            const cExs = document.getElementById('container-exs'); cExs.innerHTML = '';
            stateExs.forEach((obj, i) => {
                cExs.innerHTML += `
                <div class="dynamic-block">
                    <div class="block-header">Exemplo ${i+1} <button class="btn-danger" onclick="removerBloco('exs', ${i})">✕ Remover</button></div>
                    <div class="form-group"><label>Arquivo de Áudio do Exemplo</label>
                        <div style="display:flex; gap:5px;">
                            <input type="text" class="ex-audio-input" value="${obj.audio}" oninput="stateExs[${i}].audio = this.value;" style="flex:1;">
                            <button class="btn-action" onclick="fazerUploadDinamico('ARQUIVO_SONORO_EXEMPLO', 'stateExs', ${i}, 'audio')">📁</button>
                            <button class="btn-play" onclick="abrirMidiaIntegrada('ARQUIVO_SONORO_EXEMPLO', stateExs[${i}].audio)">▶</button>
                        </div>
                    </div>
                    <div class="form-group"><label>Transcrição</label><textarea oninput="stateExs[${i}].trans = this.value;">${obj.trans}</textarea></div>
                    <div class="form-group"><label>Tradução</label><textarea oninput="stateExs[${i}].trad = this.value;">${obj.trad}</textarea></div>
                </div>`;
            });

            const cImgs = document.getElementById('container-imgs'); cImgs.innerHTML = '';
            stateImgs.forEach((obj, i) => {
                cImgs.innerHTML += `
                <div class="dynamic-block">
                    <div class="block-header">Imagem ${i+1} <button class="btn-danger" onclick="removerBloco('imgs', ${i})">✕ Remover</button></div>
                    <div class="grid-row">
                        <div class="form-group"><label>Nome do Arquivo</label>
                            <div style="display:flex; gap:5px;">
                                <input type="text" class="img-file-input" value="${obj.img}" oninput="stateImgs[${i}].img = this.value;" style="flex:1;">
                                <button class="btn-action" onclick="fazerUploadDinamico('IMAGEM', 'stateImgs', ${i}, 'img')">📁</button>
                                <button class="btn-play" onclick="abrirMidiaIntegrada('IMAGEM', stateImgs[${i}].img)">👁️</button>
                            </div>
                        </div>
                        <div class="form-group"><label>Legenda</label><input type="text" value="${obj.leg}" oninput="stateImgs[${i}].leg = this.value;"></div>
                    </div>
                </div>`;
            });
        }

        function adicionarBloco(tipo) {
            if(tipo === 'vars') stateVars.push({item:"", audio:"", fone:"", fonet:""});
            if(tipo === 'exs') stateExs.push({audio:"", trans:"", trad:""});
            if(tipo === 'imgs') stateImgs.push({img:"", leg:""});
            renderDynamicBlocks();
        }

        function removerBloco(tipo, i) {
            if(tipo === 'vars' && i > 0) stateVars.splice(i, 1);
            if(tipo === 'exs') stateExs.splice(i, 1);
            if(tipo === 'imgs') stateImgs.splice(i, 1);
            renderDynamicBlocks();
        }

        document.getElementById('inp_ITEM_LEXICAL').addEventListener('input', function() {
            if(stateVars.length > 0) {
                stateVars[0].item = this.value;
                renderDynamicBlocks();
            }
        });

        // UPLOAD E ABRIR ARQUIVO
        function fazerUploadFixo(tipoCampo, inputId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const formData = new FormData();
                formData.append('file', file);
                formData.append('tipo_campo', tipoCampo);
                
                try {
                    const res = await fetch('/api/upload_midia', {method: 'POST', body: formData});
                    if(res.ok) {
                        const data = await res.json();
                        const el = document.getElementById(inputId);
                        el.value = el.value ? el.value + " | " + data.filename : data.filename;
                        showToast(`Arquivo ${data.filename} salvo com sucesso!`, "#10b981");
                    }
                } catch(err) { showToast("Erro no envio do arquivo.", "#ef4444"); }
            };
            input.click();
        }

        function fazerUploadDinamico(tipoCampo, stateNome, index, prop) {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const formData = new FormData();
                formData.append('file', file);
                formData.append('tipo_campo', tipoCampo);
                
                try {
                    const res = await fetch('/api/upload_midia', {method: 'POST', body: formData});
                    if(res.ok) {
                        const data = await res.json();
                        let stateArr = stateNome === 'stateVars' ? stateVars : (stateNome === 'stateExs' ? stateExs : stateImgs);
                        let atual = stateArr[index][prop];
                        stateArr[index][prop] = atual ? atual + " | " + data.filename : data.filename;
                        renderDynamicBlocks();
                        showToast(`Arquivo ${data.filename} salvo com sucesso!`, "#10b981");
                    }
                } catch(err) { showToast("Erro no envio do arquivo.", "#ef4444"); }
            };
            input.click();
        }

        async function abrirMidiaIntegrada(tipoCampo, nomesArquivos) {
            if(!nomesArquivos || nomesArquivos.trim() === "") {
                showToast("Nenhum arquivo especificado.", "#f59e0b"); return;
            }
            const arquivo = nomesArquivos.split('|')[0].trim();
            
            try {
                const res = await fetch('/api/abrir_midia', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tipo_campo: tipoCampo, arquivo: arquivo })
                });
                if(!res.ok) {
                    const data = await res.json();
                    showToast(data.detail, "#ef4444");
                }
            } catch(e) { showToast("Erro ao tentar abrir o arquivo.", "#ef4444"); }
        }

        // SALVAR NO CSV
        async function salvarAlteracoes() {
            if(indiceSelecionado < 0) return;

            let ok = true;
            CAMPOS_OBRIGATORIOS.forEach(c => {
                const el = document.getElementById(`inp_${c}`);
                if(el && el.value.trim() === "") { el.classList.add('input-error'); ok = false; }
                else if(el) { el.classList.remove('input-error'); }
            });
            if(!ok) {
                showToast("Preencha os campos obrigatórios (*) em vermelho.", "#ef4444");
                return;
            }

            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Salvando..."; btn.disabled = true;

            const pack = arr => arr.map(a => a.trim()).join(" | ").replace(/ \| $/g, '');

            const dadosParaSalvar = {
                "CLASSE_GRAMATICAL": document.getElementById('inp_CLASSE_GRAMATICAL').value,
                "CAMPO_SEMANTICO": document.getElementById('inp_CAMPO_SEMANTICO').value,
                "SUB_CAMPO_SEMANTICO": document.getElementById('inp_SUB_CAMPO_SEMANTICO').value,
                "TRADUCAO_SIGNIFICADO": document.getElementById('inp_TRADUCAO_SIGNIFICADO').value,
                "ITENS_RELACIONADOS": document.getElementById('inp_ITENS_RELACIONADOS').value,
                "DESCRICAO": document.getElementById('inp_DESCRICAO').value,
                "ARQUIVO_VIDEO": document.getElementById('inp_ARQUIVO_VIDEO').value,
                
                "ITEM_LEXICAL": pack(stateVars.map(v => v.item)),
                "ARQUIVO_SONORO": pack(stateVars.map(v => v.audio)),
                "TRANSCRICAO_FONEMICA": pack(stateVars.map(v => v.fone)),
                "TRANSCRICAO_FONETICA": pack(stateVars.map(v => v.fonet)),

                "ARQUIVO_SONORO_EXEMPLO": pack(stateExs.map(e => e.audio)),
                "TRANSCRICAO_EXEMPLO": pack(stateExs.map(e => e.trans)),
                "TRADUCAO_EXEMPLO": pack(stateExs.map(e => e.trad)),

                "IMAGEM": pack(stateImgs.map(i => i.img)),
                "LEGENDA_IMAGEM": pack(stateImgs.map(i => i.leg)),
            };

            try {
                const res = await fetch('/api/salvar_linha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ indice: indiceSelecionado, dados: dadosParaSalvar })
                });

                if(res.ok) {
                    showToast("Alterações gravadas no dicionario.csv!", "#10b981");
                    Object.assign(dadosGlobais[indiceSelecionado], dadosParaSalvar);
                    
                    // Remove temporariamente o status de erro visual do arquivo se foi alterado
                    if(errosMidiaGlobais[indiceSelecionado]) delete errosMidiaGlobais[indiceSelecionado];
                    const idxCampo = errosCamposGlobais.indexOf(indiceSelecionado);
                    if (idxCampo > -1) errosCamposGlobais.splice(idxCampo, 1);
                    
                    const palavra = (dadosParaSalvar.ITEM_LEXICAL || "Sem termo").split('|')[0].trim();
                    document.getElementById('formTitle').innerText = `Editando: ${palavra}`;
                    if(document.getElementById('searchInput').value === "") renderizarLista(dadosGlobais);
                    else filtrarLista();
                    
                } else { showToast("Erro crítico ao salvar no arquivo CSV.", "#ef4444"); }
            } catch (err) { showToast("Erro de comunicação com o servidor.", "#ef4444"); } 
            finally { btn.innerText = "Salvar Alterações"; btn.disabled = false; }
        }

        // UTILIDADES UI
        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function showToast(msg, bg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.background = bg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }
    </script>
</body>
</html>
